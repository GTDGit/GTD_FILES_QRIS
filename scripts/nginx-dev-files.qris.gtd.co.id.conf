# =============================================================================
# files-qris (QRIS document portal) — DEV reverse proxy
# Domain: dev-files.qris.gtd.co.id
#
# A public, token-gated portal that delivers merchant onboarding documents
# (KTP, selfie with KTP, business-location photo, plus one extra) to Nobu for
# manual QRIS registration. Every route requires an unguessable UUIDv4 token;
# files live in private S3 (Jakarta) and are only ever streamed through the Go
# backend on 127.0.0.1:8090 after the token + bundle state are validated.
#
# Uploads do NOT happen here — operators upload via the admin gateway
# (/v1/admin/qris/documents). This host is download/confirm only.
# =============================================================================

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name dev-files.qris.gtd.co.id;
    return 301 https://$host$request_uri;
}

# HTTPS portal server
server {
    listen 443 ssl http2;
    server_name dev-files.qris.gtd.co.id;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/dev-files.qris.gtd.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-files.qris.gtd.co.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers. Sensitive PII documents: deny framing, deny indexing,
    # do not let intermediaries cache responses.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-store, private" always;

    # Files are small phone photos; cap request size defensively.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
