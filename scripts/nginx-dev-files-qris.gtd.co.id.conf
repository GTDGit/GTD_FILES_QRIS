# =============================================================================
# files-qris (QRIS document portal) — DEV reverse proxy, behind Cloudflare
# Domain: dev-files-qris.gtd.co.id   (1-level subdomain so Cloudflare Universal
# SSL covers it; *.qris.gtd.co.id would need Advanced Certificate Manager)
#
# A token-gated portal that delivers merchant onboarding documents (KTP, selfie
# with KTP, business-location photo, plus one extra) to Nobu for manual QRIS
# registration. Every route requires an unguessable UUIDv4 token; files live in
# private S3 (Jakarta) and are only ever streamed through the Go backend on
# 127.0.0.1:8090 after the token + bundle state are validated.
#
# Cloudflare runs in Full mode: traffic is CF -> origin over TLS using a
# self-signed origin cert. Generate it once on the host:
#   sudo mkdir -p /etc/ssl/files-qris
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/files-qris/privkey.pem \
#     -out /etc/ssl/files-qris/fullchain.pem \
#     -subj '/CN=dev-files-qris.gtd.co.id'
#
# Uploads do NOT happen here — operators upload via the admin gateway
# (/v1/admin/qris/documents). This host is download/confirm only.
# =============================================================================

server {
    listen 443 ssl http2;
    server_name dev-files-qris.gtd.co.id;

    ssl_certificate /etc/ssl/files-qris/fullchain.pem;
    ssl_certificate_key /etc/ssl/files-qris/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restore the real client IP from Cloudflare so the PDP audit log records
    # the actual visitor, not a CF edge IP. (snippet lists CF IP ranges +
    # real_ip_header CF-Connecting-IP)
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    # Sensitive PII docs: deny framing/indexing, no intermediary caching.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Cache-Control "no-store, private" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name dev-files-qris.gtd.co.id;
    return 301 https://$host$request_uri;
}
