# =============================================================================
# files (GTD file-delivery portal) — DEV reverse proxy, behind Cloudflare
# Domain: dev-files.gtd.co.id   (1-level subdomain so Cloudflare Universal SSL
# covers it; a 2-level subdomain would need Advanced Certificate Manager)
#
# A generic file portal. Open upload at /api (no auth) creates token-gated,
# shareable links; delivery routes require an unguessable UUIDv4 token. Files
# live in private S3 (Jakarta) and are only ever streamed through the Go backend
# on 127.0.0.1:8090 after the token + bundle state are validated. No public URL.
#
# Cloudflare runs in Full mode: traffic is CF -> origin over TLS using a
# self-signed origin cert. Generate it once on the host:
#   sudo mkdir -p /etc/ssl/files
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/files/privkey.pem \
#     -out /etc/ssl/files/fullchain.pem \
#     -subj '/CN=dev-files.gtd.co.id'
# =============================================================================

server {
    listen 443 ssl http2;
    server_name dev-files.gtd.co.id;

    ssl_certificate /etc/ssl/files/fullchain.pem;
    ssl_certificate_key /etc/ssl/files/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restore the real client IP from Cloudflare so the PDP audit log records
    # the actual visitor, not a CF edge IP.
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    # Sensitive files: deny framing/indexing, no intermediary caching.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Cache-Control "no-store, private" always;

    # Uploads happen here now (/api/upload). Allow generous multipart bodies:
    # 15 MB/file backend cap, multiple files per request. Keep in sync with
    # FILES_MAX_UPLOAD_MB and the backend MaxBytesReader fanout.
    client_max_body_size 160m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    server_name dev-files.gtd.co.id;
    return 301 https://$host$request_uri;
}
